<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <title>Marker AR (MindAR)</title>

    <!-- A-Frame, then MindAR's A-Frame build (order matters). Documented pairing. -->
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <style>
      html, body { margin: 0; height: 100%; background: #000; color: #e7ecf2;
        font: 15px/1.45 system-ui, -apple-system, Segoe UI, Roboto, sans-serif; overflow: hidden; }
      /* MindAR needs the scene `embedded` inside a full-size container. */
      #ar-container { position: absolute; inset: 0; width: 100%; height: 100%; overflow: hidden; }

      /* Non-blocking hint so the camera shows immediately (autoStart). */
      #hint {
        position: fixed; top: 0; left: 0; right: 0; z-index: 10;
        display: flex; align-items: center; gap: 10px; justify-content: center;
        padding: max(10px, env(safe-area-inset-top)) 12px 10px;
        background: linear-gradient(to bottom, rgba(0,0,0,.65), rgba(0,0,0,0));
        pointer-events: none; font-size: 13px; text-shadow: 0 1px 3px #000;
      }
      #hint img { width: 46px; height: auto; border-radius: 6px; border: 1px solid #fff6; }
      #hint a { color: #9fc0ff; pointer-events: auto; }
      #msg { position: fixed; bottom: 16px; left: 0; right: 0; text-align: center; z-index: 10;
        color: #ff9a9a; font-size: 13px; text-shadow: 0 1px 3px #000; }
    </style>
  </head>
  <body>
    <div id="hint">
      <img src="/marker/card.png" alt="target" />
      <span>Point at this image — <a href="/marker/card.png" target="_blank">open full size</a></span>
    </div>
    <div id="msg"></div>

    <div id="ar-container">
      <a-scene
        mindar-image="imageTargetSrc: /marker/card.mind; uiScanning: yes; uiLoading: no; uiError: no"
        embedded
        color-space="sRGB"
        renderer="colorManagement: true, physicallyCorrectLights"
        vr-mode-ui="enabled: false"
        device-orientation-permission-ui="enabled: false">
        <a-assets>
          <a-asset-item id="robot" src="/models/RobotExpressive.glb"></a-asset-item>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity id="target" mindar-image-target="targetIndex: 0">
          <a-gltf-model
            src="#robot"
            play-clip="clip: Dance"
            rotation="0 0 0"
            position="0 0 0"
            scale="0.3 0.3 0.3">
          </a-gltf-model>
        </a-entity>
      </a-scene>
    </div>

    <script>
      // Play a named glTF animation clip (no aframe-extras needed).
      AFRAME.registerComponent('play-clip', {
        schema: { clip: { default: '' } },
        init() {
          this.el.addEventListener('model-loaded', () => {
            const mesh = this.el.getObject3D('mesh');
            const clips = mesh && mesh.animations;
            if (!clips || !clips.length) return;
            this.mixer = new AFRAME.THREE.AnimationMixer(mesh);
            const clip = this.data.clip
              ? AFRAME.THREE.AnimationClip.findByName(clips, this.data.clip) || clips[0]
              : clips[0];
            this.mixer.clipAction(clip).play();
          });
        },
        tick(_t, dt) { if (this.mixer) this.mixer.update(dt / 1000); },
      });

      const sceneEl = document.querySelector('a-scene');
      const msg = document.getElementById('msg');
      const hint = document.getElementById('hint');

      // Safeguard: force a transparent clear so the camera video shows behind the canvas.
      sceneEl.addEventListener('render-target-loaded', () => {
        try { sceneEl.renderer.setClearColor(0x000000, 0); sceneEl.renderer.setClearAlpha(0); } catch (e) {}
      });

      sceneEl.addEventListener('arReady', () => {
        try { sceneEl.renderer.setClearAlpha(0); } catch (e) {}
        msg.textContent = '';
      });
      sceneEl.addEventListener('arError', () => {
        msg.textContent = 'Camera/AR failed to start — check camera permission and that you are on the https tunnel URL.';
      });
      // Hide the hint once the marker is found.
      document.getElementById('target').addEventListener('targetFound', () => { hint.style.display = 'none'; });
      document.getElementById('target').addEventListener('targetLost', () => { hint.style.display = 'flex'; });
    </script>
  </body>
</html>
